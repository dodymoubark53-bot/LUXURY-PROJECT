<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TiT0 - مساعدك السياحي</title>
<style>
  :root{
    --navy:#0d1730;
    --navy2:#152348;
    --red:#e1352f;
    --blue:#1f6fd6;
    --gold:#f4c542;
    --white:#ffffff;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Tahoma','Segoe UI',sans-serif;
    background:var(--navy);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  /* ---------- HOME SCREEN ---------- */
  .phone{
    position:relative;
    width:100%;
    max-width:420px;
    height:100vh;
    max-height:900px;
    background:linear-gradient(180deg,#0a1228 0%, var(--navy) 60%, #050a18 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:60px 20px 40px;
    position:relative;
    border-radius:0;
    overflow:hidden;
  }

  .agent-wrap{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
    transition:transform .25s ease;
    user-select:none;
    -webkit-tap-highlight-color: transparent;
  }
  .agent-wrap:active{ transform:scale(0.96); }

  .bubble{
    position:relative;
    background:var(--white);
    border-radius:24px;
    padding:10px 26px;
    font-weight:bold;
    color:var(--navy);
    text-align:center;
    box-shadow:0 8px 18px rgba(0,0,0,.35);
    margin-bottom:8px;
    animation: float 3s ease-in-out infinite;
  }
  .bubble .ar{
    color:var(--red);
    font-size:20px;
    display:block;
    line-height:1.3;
  }
  .bubble .en{
    color:var(--navy);
    font-size:22px;
    letter-spacing:1px;
    display:block;
  }
  .bubble::after{
    content:'';
    position:absolute;
    bottom:-10px;
    left:50%;
    transform:translateX(-50%);
    border-width:10px 10px 0 10px;
    border-style:solid;
    border-color:var(--white) transparent transparent transparent;
  }

  .figure-wrap{
    position:relative;
    width:230px;
    margin-top:6px;
    display:flex;
    flex-direction:column;
    align-items:center;
    animation: float 3s ease-in-out infinite;
    animation-delay:.15s;
  }

  .figure{
    width:200px;
    filter:drop-shadow(0 10px 25px rgba(0,0,0,.45));
  }

  .ring{
    margin-top:-18px;
    width:130px;
    height:130px;
    border-radius:50%;
    background:var(--blue);
    border:8px solid var(--red);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 18px rgba(0,0,0,.4);
  }
  .ring-text{
    color:var(--white);
    font-weight:bold;
    font-size:28px;
    letter-spacing:1px;
    font-family:'Tahoma',sans-serif;
  }

  @keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-8px); }
  }

  .badge-label{
    margin-top:14px;
    color:var(--gold);
    font-size:14px;
    letter-spacing:2px;
    opacity:.85;
    font-family:Tahoma, sans-serif;
  }

  .tap-hint{
    position:absolute;
    bottom:34px;
    left:0; right:0;
    text-align:center;
    color:rgba(255,255,255,.55);
    font-size:13px;
    letter-spacing:1px;
  }

  /* ---------- CHAT SCREEN ---------- */
  .chat-screen{
    position:absolute;
    inset:0;
    background:var(--navy);
    display:flex;
    flex-direction:column;
    transform:translateY(100%);
    transition:transform .35s cubic-bezier(.22,.9,.32,1);
    z-index:10;
  }
  .chat-screen.open{ transform:translateY(0); }

  .chat-header{
    display:flex;
    align-items:center;
    gap:12px;
    padding:16px 18px;
    background:var(--navy2);
    border-bottom:2px solid var(--red);
  }
  .chat-header .back{
    background:none;
    border:none;
    color:var(--white);
    font-size:22px;
    cursor:pointer;
    line-height:1;
    padding:4px 8px;
    border-radius:8px;
  }
  .chat-header .back:active{ background:rgba(255,255,255,.1); }
  .chat-avatar{
    width:42px; height:42px;
    border-radius:50%;
    background:var(--red);
    display:flex; align-items:center; justify-content:center;
    color:var(--white);
    font-weight:bold;
    font-size:14px;
    border:2px solid var(--gold);
    flex-shrink:0;
  }
  .chat-title{ color:var(--white); }
  .chat-title b{ font-size:16px; display:block; }
  .chat-title span{ font-size:12px; color:var(--gold); }

  .chat-messages{
    flex:1;
    overflow-y:auto;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .msg{
    max-width:80%;
    padding:11px 16px;
    border-radius:18px;
    font-size:14px;
    line-height:1.7;
    word-wrap:break-word;
  }
  .msg.bot{
    background:var(--navy2);
    color:var(--white);
    align-self:flex-start;
    border:1px solid rgba(244,197,66,.25);
    border-bottom-left-radius:4px;
  }
  .msg.user{
    background:var(--blue);
    color:var(--white);
    align-self:flex-end;
    border-bottom-right-radius:4px;
  }
  .msg.bot.typing{
    color:rgba(255,255,255,.5);
    font-style:italic;
  }

  .chat-input-bar{
    display:flex;
    gap:10px;
    padding:14px;
    background:var(--navy2);
    border-top:1px solid rgba(255,255,255,.08);
  }
  .chat-input-bar input{
    flex:1;
    border:none;
    border-radius:22px;
    padding:12px 18px;
    background:rgba(255,255,255,.08);
    color:var(--white);
    font-size:14px;
    outline:none;
    font-family:inherit;
  }
  .chat-input-bar input::placeholder{ color:rgba(255,255,255,.4); }
  .chat-input-bar button{
    background:var(--red);
    border:none;
    color:var(--white);
    width:46px; height:46px;
    border-radius:50%;
    font-size:18px;
    cursor:pointer;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition:transform .15s;
  }
  .chat-input-bar button:active{ transform:scale(0.9); }

  @media (max-width:380px){
    .figure{ width:190px; }
    .bubble .ar{ font-size:17px; }
    .bubble .en{ font-size:19px; }
  }
</style>
</head>

    <div class="badge-label">TOURISM ASSISTANT</div>
  </div>

  <div class="tap-hint">دوس على الأيقونة لبدء المحادثة</div>

  <!-- Chat screen -->
  <div class="chat-screen" id="chatScreen">
    <div class="chat-header">
      <button class="back" onclick="closeChat()" aria-label="رجوع">→</button>
      <div class="chat-avatar">TiT0</div>
      <div class="chat-title">
        <b>TiT0</b>
        <span>مساعدك السياحي الذكي</span>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="msg bot">أهلاً بيك! أنا TiT0 🧳 اسألني عن أي وجهة سياحية، أماكن، أسعار، أو نصايح سفر وهجاوبك فورًا.</div>
    </div>

    <div class="chat-input-bar">
      <input type="text" id="chatInput" placeholder="اكتب سؤالك عن السياحة هنا..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()" aria-label="إرسال">➤</button>
    </div>
  </div>

</div>

<script>
function openChat(){
  document.getElementById('chatScreen').classList.add('open');
}
function closeChat(){
  document.getElementById('chatScreen').classList.remove('open');
}

const responses = [
  {keys:['مصر','اهرام','القاهرة','الجيزة'], reply:'مصر وجهة رائعة! ينصح بزيارة الأهرامات والمتحف المصري الكبير في الجيزة، ومنطقة خان الخليلي في القاهرة، والأقصر وأسوان للمعابد الفرعونية.'},
  {keys:['شرم','غردقة','بحر','شاطئ','دهب'], reply:'لو بتحب البحر، شرم الشيخ والغردقة ودهب من أفضل الأماكن في مصر للغطس والشواطئ، والطقس مناسب طول السنة تقريبًا.'},
  {keys:['دبي','الإمارات','أبوظبي'], reply:'دبي فيها برج خليفة، دبي مول، وصحراء رائعة لرحلات السفاري. أبوظبي فيها جامع الشيخ زايد ولوفر أبوظبي.'},
  {keys:['تركيا','اسطنبول','اسطمبول'], reply:'إسطنبول تجمع بين أوروبا وآسيا، تستحق زيارة آيا صوفيا، السوق المسقوف، ورحلة بالقارب في البوسفور.'},
  {keys:['ميزانية','سعر','تكلفة','رخيص','فلوس'], reply:'لتوفير ميزانية السفر: حجز التذاكر مبكرًا، السكن في شقق مفروشة بدل الفنادق، والاستفادة من النقل العام بدل التاكسي.'},
  {keys:['جواز','فيزا','تأشيرة'], reply:'لازم تتأكد من شروط التأشيرة لبلدك قبل السفر، وبعض الدول بتوفر فيزا عند الوصول أو تأشيرة إلكترونية أونلاين.'},
  {keys:['أفضل وقت','موسم','طقس'], reply:'أفضل وقت للسفر يعتمد على الوجهة: عمومًا الربيع والخريف يكونوا أنسب لتجنب الحر الشديد أو البرد القارس في كتير من البلاد.'}
];

function getReply(text){
  const lower = text.trim();
  for(const r of responses){
    if(r.keys.some(k => lower.includes(k))){
      return r.reply;
    }
  }
  return 'سؤال جميل عن السياحة! ممكن تحدد لي الدولة أو المدينة اللي حابب تعرف عنها، وهديك تفاصيل أكتر عن أماكن الزيارة، التكلفة، وأفضل وقت للسفر.';
}

function sendMessage(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;

  const messages = document.getElementById('chatMessages');

  const userMsg = document.createElement('div');
  userMsg.className = 'msg user';
  userMsg.textContent = text;
  messages.appendChild(userMsg);

  input.value = '';
  messages.scrollTop = messages.scrollHeight;

  const typing = document.createElement('div');
  typing.className = 'msg bot typing';
  typing.textContent = 'TiT0 بيكتب...';
  messages.appendChild(typing);
  messages.scrollTop = messages.scrollHeight;

  setTimeout(()=>{
    typing.remove();
    const botMsg = document.createElement('div');
    botMsg.className = 'msg bot';
    botMsg.textContent = getReply(text);
    messages.appendChild(botMsg);
    messages.scrollTop = messages.scrollHeight;
  }, 700);
}
</script>
